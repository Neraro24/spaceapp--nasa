<!DOCTYPE html>
<html>
<head>
  <title>NASA Space System</title>

  <style>
    body { margin:0; overflow:hidden; font-family:Arial; background:black; }

    #ui { position:absolute; top:0; left:0; width:100%; height:100%; }

    #title {
      position:absolute;
      top:10px;
      width:100%;
      text-align:center;
      color:white;
      font-size:26px;
    }

    #panel {
      position:absolute;
      left:20px;
      top:20px;
      background:rgba(0,0,0,0.85);
      padding:15px;
      color:white;
      width:260px;
      border-radius:12px;
    }

    #ai {
      position:absolute;
      bottom:20px;
      left:20px;
      width:260px;
      background:rgba(0,0,0,0.85);
      padding:10px;
      color:white;
      border-radius:10px;
    }

    #menu {
      position:absolute;
      top:20px;
      right:20px;
      color:white;
    }

    #dropdown {
      display:none;
      background:rgba(0,0,0,0.85);
      padding:10px;
      border-radius:10px;
    }

    .hidden { display:none; }
  </style>
</head>

<body>

<div id="title">🚀 NASA Space Mission System</div>

<div id="panel">
  <h3>Mission Data</h3>
  <p id="info">Click objects</p>
  <p id="temp">Temp: --</p>
  <p id="mode">Mode: Earth</p>
</div>

<div id="ai">
  🤖 AI Assistant
  <div id="chat"></div>
  <input placeholder="Ask..." onkeydown="askAI(event)" style="width:100%">
</div>

<div id="menu">
  <button onclick="toggleMenu()">☰ Menu</button>
  <div id="dropdown">
    <p onclick="selectLayer('flood')">Flood</p>
    <p onclick="selectLayer('heat')">Heat</p>
    <p onclick="selectLayer('quake')">Quake</p>
    <p onclick="enterMoon()">🌕 Enter Moon</p>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
// ================= SYSTEM STATE =================
let mode = "earth";

// ================= SCENE =================
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75,innerWidth/innerHeight,0.1,1000);
camera.position.z = 3;

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth,innerHeight);
document.body.appendChild(renderer.domElement);

// LIGHT
const light = new THREE.PointLight(0xffffff,2);
light.position.set(5,3,5);
scene.add(light);

// ================= EARTH =================
const loader = new THREE.TextureLoader();

const earth = new THREE.Mesh(
  new THREE.SphereGeometry(1,128,128),
  new THREE.MeshStandardMaterial({
    map: loader.load("https://threejs.org/examples/textures/land_ocean_ice_cloud_2048.jpg")
  })
);
scene.add(earth);

// CLOUDS
const clouds = new THREE.Mesh(
  new THREE.SphereGeometry(1.01,128,128),
  new THREE.MeshStandardMaterial({
    map: loader.load("https://threejs.org/examples/textures/planets/earth_clouds_1024.png"),
    transparent:true
  })
);
scene.add(clouds);

// ================= CLIMATE LAYERS =================
const flood = new THREE.Mesh(new THREE.SphereGeometry(1.02,128,128),
  new THREE.MeshBasicMaterial({color:0x00aaff,transparent:true,opacity:0.18,blending:THREE.AdditiveBlending})
);
const heat = new THREE.Mesh(new THREE.SphereGeometry(1.02,128,128),
  new THREE.MeshBasicMaterial({color:0xff3300,transparent:true,opacity:0.18,blending:THREE.AdditiveBlending})
);
const quake = new THREE.Mesh(new THREE.SphereGeometry(1.02,128,128),
  new THREE.MeshBasicMaterial({color:0xc49a6c,transparent:true,opacity:0.18,blending:THREE.AdditiveBlending})
);

scene.add(flood,heat,quake);
flood.visible=heat.visible=quake.visible=false;

// ================= MOON =================
const moon = new THREE.Mesh(
  new THREE.SphereGeometry(0.3,64,64),
  new THREE.MeshStandardMaterial({color:0x999999})
);
moon.position.x = 3;
scene.add(moon);

// ================= RAYCAST =================
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

window.addEventListener("mousemove",(e)=>{
  mouse.x = (e.clientX/innerWidth)*2-1;
  mouse.y = -(e.clientY/innerHeight)*2+1;
});

window.addEventListener("click",()=>{
  raycaster.setFromCamera(mouse,camera);
  const hit = raycaster.intersectObjects([earth,moon]);

  if(hit.length>0){
    if(hit[0].object===earth){
      showEarthData();
    }
    if(hit[0].object===moon){
      enterMoon();
    }
  }
});

// ================= EARTH DATA =================
function showEarthData(){
  document.getElementById("info").innerText="Earth Region Scanned";
  document.getElementById("temp").innerText="Temp: "+(20+Math.random()*20).toFixed(1)+"°C";
}

// ================= MENU =================
function toggleMenu(){
  const d=document.getElementById("dropdown");
  d.style.display=d.style.display==="block"?"none":"block";
}

function selectLayer(type){
  flood.visible=heat.visible=quake.visible=false;
  if(type==="flood") flood.visible=true;
  if(type==="heat") heat.visible=true;
  if(type==="quake") quake.visible=true;
}

// ================= MOON MODE =================
function enterMoon(){
  mode="moon";
  document.getElementById("mode").innerText="Mode: Moon";

  camera.position.set(0,0,2);

  showMoonBaseMenu();
}

// ================= MOON BASE =================
function showMoonBaseMenu(){
  document.getElementById("info").innerText=
  "Moon Base: Apollo | Shuttle | Orion";
}

// ================= AI =================
function askAI(e){
  if(e.key==="Enter"){
    const input=e.target.value;
    const chat=document.getElementById("chat");

    let reply="NASA AI: I can guide missions.";

    if(input.includes("moon")) reply="Moon has 3 ships: Apollo, Shuttle, Orion.";
    if(input.includes("earth")) reply="Earth has climate layers and real-time data.";

    chat.innerHTML+="<p>🧑 "+input+"</p><p>🤖 "+reply+"</p>";

    e.target.value="";
  }
}

// ================= ANIMATE =================
function animate(){
  requestAnimationFrame(animate);

  earth.rotation.y+=0.002;
  clouds.rotation.y+=0.0025;
  moon.rotation.y+=0.001;

  const t=Date.now()*0.002;
  flood.material.opacity=0.15+Math.sin(t)*0.03;
  heat.material.opacity=0.15+Math.sin(t)*0.03;
  quake.material.opacity=0.15+Math.sin(t)*0.03;

  renderer.render(scene,camera);
}

animate();
</script>

</body>
</html>
